<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Cardiovascular Disease Prediction</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- Custom CSS -->

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container py-5">

    <!-- Header -->

    <div class="text-center mb-5">

        <i class="fa-solid fa-heart-pulse text-danger display-2"></i>

        <h1 class="mt-3 fw-bold">

            Cardiovascular Disease Prediction

        </h1>

        <p class="text-muted">

            Artificial Intelligence & Machine Learning Based Diagnosis

        </p>

    </div>

    <!-- Card -->

    <div class="card shadow-lg border-0 rounded-4">

        <div class="card-header bg-primary text-white text-center">

            <h3>

                <i class="fa-solid fa-user-doctor"></i>

                Patient Information

            </h3>

        </div>

        <div class="card-body p-4">

            <form action="/predict"
                  method="POST">

                <div class="row">

                    <!-- Age -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Age (Days)

                        </label>

                        <input
                            type="number"
                            class="form-control"
                            name="age"
                            required>

                    </div>

                    <!-- Gender -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Gender

                        </label>

                        <select
                            class="form-select"
                            name="gender">

                            <option value="1">

                                Female

                            </option>

                            <option value="2">

                                Male

                            </option>

                        </select>

                    </div>

                    <!-- Height -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Height (cm)

                        </label>

                        <input
                            type="number"
                            class="form-control"
                            name="height"
                            required>

                    </div>

                    <!-- Weight -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Weight (kg)

                        </label>

                        <input
                            type="number"
                            class="form-control"
                            name="weight"
                            required>

                    </div>

                    <!-- Systolic -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Systolic BP

                        </label>

                        <input
                            type="number"
                            class="form-control"
                            name="ap_hi"
                            required>

                    </div>

                    <!-- Diastolic -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Diastolic BP

                        </label>

                        <input
                            type="number"
                            class="form-control"
                            name="ap_lo"
                            required>

                    </div>

                    <!-- Cholesterol -->

                    <div class="col-md-4 mb-3">

                        <label class="form-label">

                            Cholesterol

                        </label>

                        <select
                            class="form-select"
                            name="cholesterol">

                            <option value="1">

                                Normal

                            </option>

                            <option value="2">

                                Above Normal

                            </option>

                            <option value="3">

                                Well Above Normal

                            </option>

                        </select>

                    </div>

                    <!-- Glucose -->

                    <div class="col-md-4 mb-3">

                        <label class="form-label">

                            Glucose

                        </label>

                        <select
                            class="form-select"
                            name="glucose">

                            <option value="1">

                                Normal

                            </option>

                            <option value="2">

                                Above Normal

                            </option>

                            <option value="3">

                                Well Above Normal

                            </option>

                        </select>

                    </div>

                    <!-- Smoking -->

                    <div class="col-md-4 mb-3">

                        <label class="form-label">

                            Smoking

                        </label>

                        <select
                            class="form-select"
                            name="smoke">

                            <option value="0">

                                No

                            </option>

                            <option value="1">

                                Yes

                            </option>

                        </select>

                    </div>

                    <!-- Alcohol -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Alcohol

                        </label>

                        <select
                            class="form-select"
                            name="alcohol">

                            <option value="0">

                                No

                            </option>

                            <option value="1">

                                Yes

                            </option>

                        </select>

                    </div>

                    <!-- Physical Activity -->

                    <div class="col-md-6 mb-4">

                        <label class="form-label">

                            Physical Activity

                        </label>

                        <select
                            class="form-select"
                            name="active">

                            <option value="1">

                                Active

                            </option>

                            <option value="0">

                                Inactive

                            </option>

                        </select>

                    </div>

                </div>

                <!-- Buttons -->

                <div class="text-center">

                    <button
                        class="btn btn-success btn-lg px-5"
                        type="submit">

                        <i class="fa-solid fa-stethoscope"></i>

                        Predict Disease

                    </button>

                    <button
                        class="btn btn-secondary btn-lg px-5 ms-3"
                        type="reset">

                        <i class="fa-solid fa-rotate"></i>

                        Reset

                    </button>

                </div>

            </form>

        </div>

    </div>

    <!-- Footer -->

    <div class="text-center mt-5">

        <hr>

        <p class="text-muted">

            © 2026 Cardiovascular Disease Prediction System

            <br>

            Developed using Python • Flask • Scikit-Learn • TensorFlow

        </p>

    </div>

</div>

<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
